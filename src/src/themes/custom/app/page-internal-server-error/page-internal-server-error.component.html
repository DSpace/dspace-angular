<header class="notfound-hero">
  <div class="container">
    <div class="notfound-code">500</div>
    <h1 class="notfound-title">{{ "500.page-internal-server-error" | translate }}</h1>
    <div class="hero-subtitle-container">
      <span class="hero-line"></span>
      <p class="hero-subtitle">{{ "browse.common.subtitle" | translate }}</p>
      <span class="hero-line right"></span>
    </div>
  </div>
</header>

<div class="notfound-body">
  <div class="notfound-card">
    <div class="notfound-icon">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    <p class="notfound-message">{{ "500.help" | translate }}</p>
    <a routerLink="/home" class="notfound-btn" role="button" tabindex="0">
      <i class="fas fa-home"></i>
      {{ "500.link.home-page" | translate }}
    </a>
  </div>
</div>
