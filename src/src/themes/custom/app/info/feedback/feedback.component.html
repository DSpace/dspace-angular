<header class="info-page-hero">
  <div class="info-badge">{{ 'feedback.badge' | translate }}</div>
  <h1>{{ 'feedback.hero.title.prefix' | translate }}<span>{{ 'feedback.hero.title.word' | translate }}</span></h1>
  <div class="hero-subtitle-container">
    <span class="hero-line"></span>
    <span class="hero-subtitle">{{ 'feedback.hero.subtitle' | translate }}</span>
    <span class="hero-line right"></span>
  </div>
</header>

<div class="info-page-wrapper">
  <main class="info-page-card">
    <h2 class="fb-section-title first">{{ 'feedback.section.title' | translate }}</h2>
    <p>{{ 'info.feedback.info' | translate }}</p>

    <div class="fb-form-container">
      <ds-feedback-form></ds-feedback-form>
    </div>
  </main>
</div>
