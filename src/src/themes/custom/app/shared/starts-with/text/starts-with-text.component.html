<form class="w-100" [formGroup]="formData" (ngSubmit)="submitForm(formData.value)">
  <div class="browse-search-area">
    <div class="browse-pill-box">
      <i class="fas fa-search browse-search-icon"></i>
      <input
        class="browse-search-input"
        [attr.aria-label]="'browse.startsWith.input' | translate"
        placeholder="{{ 'browse.search-form.placeholder' | translate }}"
        type="text"
        name="startsWith"
        formControlName="startsWith"
        [value]="getStartsWith()" />
      <button class="browse-search-btn" type="submit" role="button" tabindex="0">
        &#8594;
      </button>
    </div>
    <small class="browse-search-hint">{{ 'browse.startsWith.type_text' | translate }}</small>
  </div>
</form>
