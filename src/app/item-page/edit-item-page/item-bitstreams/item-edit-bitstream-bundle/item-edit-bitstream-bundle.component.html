<ng-template #bundleView>
  <div class="row bundle-row" [ngClass]="{'table-danger': isMarkedForRemoval()}">
    <div class="{{bundleNameColumn.buildClasses()}} font-weight-bold row-element d-flex align-items-center">
      <ds-item-edit-bitstream-drag-handle></ds-item-edit-bitstream-drag-handle>
      <div class="d-flex flex-column-reverse flex-lg-row">
        <div class="float-left d-flex align-items-center">
          {{'item.edit.bitstreams.bundle.name' | translate:{ name: dsoNameService.getName(bundle) } }}
        </div>
        <span *ngIf="isMarkedForRemoval()" class="badge bg-danger text-white ml-lg-2 px-2 px-sm-3 py-2 bundle-remove-warning text-wrap">
          <i class="fas fa-exclamation-triangle mr-1"></i>
          {{ 'item.edit.bitstreams.bundle.remove-warning' | translate }}
        </span>
      </div>
    </div>
    <div class="{{columnSizes.columns[3].buildClasses()}} text-center row-element">
      <div class="btn-group bundle-action-buttons">
        <button [routerLink]="[itemPageRoute, 'bitstreams', 'new']"
                [queryParams]="{bundle: bundle.id}"
                [disabled]="isMarkedForRemoval()"
                class="btn btn-outline-success btn-sm"
                title="{{'item.edit.bitstreams.bundle.edit.buttons.upload' | translate}}">
          <i class="fas fa-upload fa-fw"></i>
        </button>
        <button [disabled]="!canRemove()" (click)="removeBundle()"
                class="btn btn-outline-danger btn-sm"
                title="{{'item.edit.bitstreams.bundle.edit.buttons.remove' | translate}}">
          <i class="fas fa-trash-alt fa-fw"></i>
        </button>
        <button [disabled]="!canUndo()" (click)="undoBundleRemove()"
                class="btn btn-outline-warning btn-sm"
                title="{{'item.edit.bitstreams.bundle.edit.buttons.undo' | translate}}">
          <i class="fas fa-undo-alt fa-fw"></i>
        </button>
      </div>
    </div>
  </div>
  <ds-paginated-drag-and-drop-bitstream-list [bundle]="bundle" [columnSizes]="columnSizes" [bundleUpdate]="bundleUpdate" (dropObject)="dropObject.emit($event)"></ds-paginated-drag-and-drop-bitstream-list>
</ng-template>
