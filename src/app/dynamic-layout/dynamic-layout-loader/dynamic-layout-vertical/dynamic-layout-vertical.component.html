<div id="dynamic-layout-loader">
  @if ((isXsOrSm$ | async) !== true) {
    <div class="vertical-layout">
      <ds-dynamic-layout-sidebar (selectedTabChange)="selectedTabChanged($event)" [showNav]="tabs.length > 1" [tabs]="tabs" [item]="item">
        @if (showContextMenu) {
          <div class="container d-flex justify-content-end mb-3" [class.px-0]="tabs?.length > 1">
            <ds-dso-edit-menu></ds-dso-edit-menu>
          </div>
        }
        <ds-dynamic-layout-matrix [showCellPadding]="tabs?.length <= 1" [tab]="(selectedTab$ | async)" [item]="item"></ds-dynamic-layout-matrix>
      </ds-dynamic-layout-sidebar>
    </div>
  }

  @if ((isXsOrSm$ | async)) {
    <div class="horizontal-layout">
      <ds-dynamic-layout-navbar [showNav]="(tabs.length - leadingTabs.length) > 1" (selectedTabChange)="selectedTabChanged($event)"
      [tabs]="tabs" [item]="item"></ds-dynamic-layout-navbar>
      <div class="container pt-4">
        <ds-dynamic-layout-matrix [tab]="(selectedTab$ | async)" [item]="item"></ds-dynamic-layout-matrix>
      </div>
    </div>
  }
</div>
